<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GPA Calculator (4.3 Scale)</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f6f9;
        padding: 20px;
    }

    .container {
        max-width: 800px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1 {
        text-align: center;
    }

    .course {
        display: grid;
        grid-template-columns: 2fr 1fr 1fr auto;
        gap: 10px;
        margin-bottom: 10px;
    }

    input, select {
        padding: 8px;
        border-radius: 5px;
        border: 1px solid #ccc;
    }

    button {
        padding: 8px 12px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    .add-btn {
        background: #4CAF50;
        color: white;
        margin-bottom: 15px;
    }

    .remove-btn {
        background: #e74c3c;
        color: white;
    }

    .calculate-btn {
        background: #3498db;
        color: white;
        width: 100%;
        margin-top: 15px;
    }

    .results {
        margin-top: 20px;
        background: #ecf0f1;
        padding: 15px;
        border-radius: 8px;
    }
</style>
</head>
<body>

<div class="container">
    <h1>GPA Calculator (4.3 Scale)</h1>

    <div id="courses"></div>

    <button class="add-btn" onclick="addCourse()">+ Add Course</button>
    <button class="calculate-btn" onclick="calculateGPA()">Calculate GPA</button>

    <div class="results" id="results"></div>
</div>

<script>
const gradeScale = {
    "A+": { gpa: 4.3, percent: "90-100%" },
    "A":  { gpa: 4.0, percent: "85-89%" },
    "A-": { gpa: 3.7, percent: "80-84%" },
    "B+": { gpa: 3.3, percent: "77-79%" },
    "B":  { gpa: 3.0, percent: "73-76%" },
    "B-": { gpa: 2.7, percent: "70-72%" },
    "C+": { gpa: 2.3, percent: "67-69%" },
    "C":  { gpa: 2.0, percent: "63-66%" },
    "C-": { gpa: 1.7, percent: "60-62%" },
    "D+": { gpa: 1.3, percent: "57-59%" },
    "D":  { gpa: 1.0, percent: "53-56%" },
    "D-": { gpa: 0.7, percent: "50-52%" },
    "F":  { gpa: 0.0, percent: "0-49%" }
};

function addCourse() {
    const container = document.getElementById("courses");

    const div = document.createElement("div");
    div.className = "course";

    div.innerHTML = `
        <input type="text" placeholder="Course Name">
        <input type="number" placeholder="Credits" min="0" step="0.5">
        <select>
            ${Object.keys(gradeScale).map(g => `<option value="${g}">${g}</option>`).join("")}
        </select>
        <button class="remove-btn" onclick="this.parentElement.remove()">X</button>
    `;

    container.appendChild(div);
}

function calculateGPA() {
    const courses = document.querySelectorAll(".course");
    let totalPoints = 0;
    let totalCredits = 0;
    let resultHTML = "<h3>Course Results:</h3>";

    courses.forEach(course => {
        const inputs = course.children;
        const name = inputs[0].value || "Course";
        const credits = parseFloat(inputs[1].value);
        const grade = inputs[2].value;

        if (!credits || credits <= 0) return;

        const gpa = gradeScale[grade].gpa;
        const percent = gradeScale[grade].percent;

        totalPoints += gpa * credits;
        totalCredits += credits;

        resultHTML += `<p>${name}: ${grade} (${percent}) → GPA ${gpa}</p>`;
    });

    if (totalCredits === 0) {
        document.getElementById("results").innerHTML = "Please enter valid courses.";
        return;
    }

    const gpa = (totalPoints / totalCredits).toFixed(2);

    resultHTML += `<hr><h3>Overall GPA: ${gpa}</h3>`;

    document.getElementById("results").innerHTML = resultHTML;
}

// Start with one course by default
addCourse();
</script>

</body>
</html>
